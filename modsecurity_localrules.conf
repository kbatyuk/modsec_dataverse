# --- PHASE 1: WHITELIST / EXEMPTIONS ---
# These must run first to prevent redirect loops or accidental blocking of the captcha.

# 0. NEVER BAN IP RANGES
SecRule REMOTE_ADDR "@ipMatch [Insert IPs/Ranges to never be banned]," \
    "id:1000,phase:1,nolog,allow,msg:'Internal Trusted Ranges'"

# 1. Allow if captcha requested (Prevents Redirect Loops)
SecRule REQUEST_URI "@rx /(captcha\.php|captcha-image\.php)" \
    "id:1006,phase:1,nolog,allow,ctl:ruleEngine=Off"

# 2. If VerifiedHuman cookie exists, let through
SecRule REQUEST_COOKIES:VerifiedHuman "@eq 1" \
    "id:1005,phase:1,nolog,pass,allow"

# 2.5. Whitelist Legitimate Google Indexing/Inspection Bots
SecRule REQUEST_HEADERS:User-Agent "@rx (googlebot|google-inspectiontool|urlinspectionbot)" \
    "id:1007,phase:1,nolog,allow,ctl:ruleEngine=Off,msg:'Allow Googlebot Inspection'"

# --- PHASE 2: HARD DROPS (Silent Disconnect) ---

# 3. Drop known bots/scrapers
SecRule REQUEST_HEADERS:User-Agent "@rx (turnitin|alibaba|crawler|amazonbot|openai|meta-externalagent|petal|abonti|ahrefsbot|baiduspider|bytespider|dorkbot|dotbot|ezooms|giftghost|headlesschrome|httrack|ltx71|mauibot|megaindex|mj12|openvas|rogerbot|rustbot|scoutjet|scrapy|semrushbot|seok)" \
    "id:1001,phase:1,drop,status:403,t:none,t:lowercase,log,msg:'Dropped: AI/Crawler/Scraper'"

# 4. Block Frankenstein spoofers
SecRule REQUEST_HEADERS:User-Agent "@rx (Chrome.*Firefox|Firefox.*Chrome)" \
    "id:1002,phase:1,deny,status:403,log,msg:'Instant Ban: Frankenstein Spoofer'"

# 5. Block Legacy Windows & macOS
SecRule REQUEST_HEADERS:User-Agent "@rx (Windows 95|Win95|Windows 98|Win98|Win 9x 4\.90|Windows NT (5\.[12]|6\.[0123])|Mac OS X 10[._]([0-9]|1[0-5]))" \
    "id:1003,phase:1,log,msg:'Redirect Old WIndows and macOS',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"

# 6. Block Legacy Mobile OS
SecRule REQUEST_HEADERS:User-Agent "@rx (Android [1-7]\.|iPhone OS ([1-9]|1[0-2])_)" \
    "id:1004,phase:1,log,msg:'Redirect Old Android and iOS',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"


# --- PHASE 3: SOFT BLOCKS (Redirect suspicious/outdated to Captcha) ---

# a. Old Firefox Browsers
SecRule REQUEST_HEADERS:User-Agent "@rx Firefox/([1-9]|[1-9][0-9]|1[0-2][0-9])\." \
    "id:2001,phase:1,log,msg:'Redirect Old Firefox',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"

# b. Old Chrome Browsers
SecRule REQUEST_HEADERS:User-Agent "@rx Chrome/([1-9]|[1-9][0-9]|1[0-3][0-9]|14[01]|14[02])\." \
    "id:2002,phase:1,log,msg:'Redirect Old Chrome',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"

# c. Old Safari Browsers
SecRule REQUEST_HEADERS:User-Agent "@rx Version\/([1-9]|1[0-6])\." \
    "id:2003,phase:1,log,msg:'Redirect Old Safari',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"

# d. Old Version of Linux (32-bit)
SecRule REQUEST_HEADERS:User-Agent "@rx Linux\ i686" \
    "id:2004,phase:1,log,msg:'Redirect i686',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"

# e. Browsers with suspicious .0.0.0 version patterns
SecRule REQUEST_HEADERS:User-Agent "@rx (Firefox|Chrome|Safari|Version|Edg)/.*\d+\.0\.0\.0" \
    "id:2005,phase:1,log,msg:'Suspicious Version Pattern .0.0.0',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"


# --- PHASE 4: DATA BLOCKS (Solr Filter Protection) ---

# 1. Block excessively deep filter queries (fq0 through fq9)
# Attackers use fq4, fq5, etc., to stress the Solr/DB index. 
# We block anything attempting fq3 or higher to keep queries sane.
SecRule ARGS_NAMES "@rx fq[3-9]" \
    "id:4000,phase:2,drop,status:403,log,msg:'Bloat Protection: Excessive Filter Depth'"

# --- USE #2 and #3 with caution. Legit users can get blocked --- 

# 2. Allow legitimate resource requests that contain version strings.
# This prevents rule 4002 from blocking your browser's resource loading.
# SecRule REQUEST_URI "@rx (v=11\.0\.0|version=6\.9)" \
#    "id:4001,phase:1,nolog,allow,msg:'Whitelist: Legitimate Resource Version'"

# 3. Block jsessionid in the URL (Session Fixation/Scraper Pattern) Redirect to CAPTCHA
# Legitimate users use cookies. Scrapers often append jsessionid to the URI.
# SecRule REQUEST_URI "!@rx /jakarta\.faces\.resource/" \
#    "id:4002,phase:1,log,chain,msg:'Dataverse_Session_In_URI',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"
#    SecRule REQUEST_URI "@contains jsessionid="

# 4. Request Line Limit
# Many of your logged GET requests are nearly 1000 characters long.
# This rule drops requests where the query string is suspiciously long.
SecRule QUERY_STRING "@gt 1000" \
    "id:4003,phase:1,log,msg:'Resource Protection: Query String Too Long',redirect:https://your.dataverse.edu/captcha.php?orig_uri=%{REQUEST_URI}"
